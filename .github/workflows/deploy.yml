name: CI/CD Pipeline Innovatech Frontend

on:
  push:
    branches:
      - deploy # El pipeline solo se activa en la rama deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código fuente
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: vicenteandres23/innovatech-frontend:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue remoto en AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl start docker
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            sudo docker pull vicenteandres23/innovatech-frontend:latest
            sudo docker run -d --name frontend-app -p 80:80 vicenteandres23/innovatech-frontend:latest
